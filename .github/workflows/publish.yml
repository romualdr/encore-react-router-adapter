name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (e.g. latest, next)'
        required: false
        default: 'latest'

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/encore-react-router-adapter
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm >= 11.5.1 (required for trusted publishing)
        run: |
          REQ=11.5.1
          CUR=$(npm -v)
          if [ "$(printf '%s\n' "$REQ" "$CUR" | sort -V | head -n1)" = "$REQ" ]; then
            echo "npm $CUR already meets requirement (>= $REQ)"
          else
            # self-upgrade can race with itself mid-install (MODULE_NOT_FOUND on
            # promise-retry); retry once if the partial state recovers on a
            # second pass.
            npm install -g npm@latest || npm install -g npm@latest
          fi

      - name: Install dependencies
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public --tag "${{ github.event.inputs.tag || 'latest' }}"
